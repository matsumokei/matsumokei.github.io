# Sample workflow for building and deploying a Next.js site to GitHub Pages
#
name: Deploy Astro site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f

      - name: Setup Node
        uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4 # v6.2.0
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        run: npm install -g pnpm@10.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build with Astro
        run: pnpm build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@98ef48e41587a300b82de4cf298aa98b57b2faae # pinned to commit
        with:
          path: ./dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # pinned to commit
